# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java#apache-maven-with-a-settings-path

name: Docker publish

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'
    - name: Docker login
      env:
        QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        QUARKUS_CONTAINER_IMAGE_USERNAME: automatiko
      run: docker login -u $QUARKUS_CONTAINER_IMAGE_USERNAME -p $QUARKUS_CONTAINER_IMAGE_PASSWORD
    - name: Build Automatiko Approval Tasks
      run: mvn -B -Dquarkus.container-image.tag=${{ inputs.version }}-amd -Dquarkus.container-image.push=true -Dquarkus.container-image.group=automatiko  package -Pcontainer-native --file pom.xml
  build-arm:

    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'
    - name: Docker login
      env:
        QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        QUARKUS_CONTAINER_IMAGE_USERNAME: automatiko
      run: docker login -u $QUARKUS_CONTAINER_IMAGE_USERNAME -p $QUARKUS_CONTAINER_IMAGE_PASSWORD
    - name: Build Automatiko Approval Tasks
      run: mvn -B -Dquarkus.jib.platforms=linux/arm64/v8 -Dquarkus.container-image.tag=${{ inputs.version }}-arm -Dquarkus.container-image.push=true -Dquarkus.container-image.group=automatiko  package -Pcontainer-native --file pom.xml

  build-multi-arch-native-image-container:
    runs-on: ubuntu-latest
    needs: [build, build-arm]
    steps:
    - name: Docker login
      env:
        QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        QUARKUS_CONTAINER_IMAGE_USERNAME: automatiko
      run: docker login -u $QUARKUS_CONTAINER_IMAGE_USERNAME -p $QUARKUS_CONTAINER_IMAGE_PASSWORD
    - name: Build Automatiko Approval Tasks Multi Arch
      run: |
        docker buildx imagetools create --tag automatiko/automatiko-approval-task:latest --tag automatiko/automatiko-approval-task:${{ inputs.version }} automatiko/automatiko-approval-task:${{ inputs.version }}-arm automatiko/automatiko-approval-task:${{ inputs.version }}-amd
